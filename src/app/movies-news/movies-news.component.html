<div class="index-movies">
    <h3><a href="https://metarankings.ru/meta/news/kino/">Новости кино</a></h3>
    <div class="news-item" *ngFor="let movieNew of moviesNews">
      <a href="{{movieNew.href}}"
        title="{{movieNew.title}}"><img
          class="news-thumb" src="{{movieNew.imageSrc}}"
          alt="{{movieNew.title}}"></a>
      <span class="news-title"><a
          href="{{movieNew.href}}">{{movieNew.title}}</a></span>
    </div>
  </div>
