<div class="specials-index">
    <h3><a href="https://metarankings.ru/meta/specials/">Спецматериалы</a></h3>
    <div class="news-item" *ngFor="let special of specials">
      <a href="{{special.href}}"
        title="{{special.title}}"><img class="news-thumb"
          src="{{special.imageSrc}}"
          alt="{{special.title}}"></a>
      <span class="news-title"><a href="{{special.href}}/">{{special.title}}</a></span>
    </div>
  </div>
