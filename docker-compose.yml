version: '3.8'

networks:
  myAppNetwork:
    driver: bridge

services:
  Db:
    container_name: Db
    image: postgres:17.7
    ports:
     - 5432:5432 
    networks:
      - myAppNetwork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U borisgarin || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "borisgarin"
      POSTGRES_PASSWORD: "borisgarin"
      POSTGRES_DB: "Metarankings"
    ports:
      - "5432:5432"  # Optional, for debugging

  WebApi:
    container_name: APIContainer
    image: ${DOCKER_REGISTRY-}api
    restart: unless-stopped
    ports:
      - 8081:8081
    networks:
      - myAppNetwork
    build:
      context: .
      dockerfile: API/Dockerfile
    depends_on:
      Db:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=https://+:8081
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Password=UmbracoFuse8_2023!
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
    volumes:
      - ~/.aspnet/https:/https:ro
      - ./API/Games/Images:/app/Games:rw
      - ./API/Movies/Images:/app/Movies:rw

  nginx:
    container_name: nginx_container
    image: nginx:alpine
    ports:
      - 443:443
    networks:
      - myAppNetwork
    depends_on:
      - WebApi
      - Db
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ~/.aspnet/https:/etc/nginx/ssl:ro

volumes:
  postgres_data: